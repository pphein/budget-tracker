<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bar chart - 3 ascending bars -->
  <rect x="68" y="296" width="90" height="144" rx="14" fill="white" opacity="0.7"/>
  <rect x="211" y="196" width="90" height="244" rx="14" fill="white" opacity="0.85"/>
  <rect x="354" y="120" width="90" height="320" rx="14" fill="white"/>
  <!-- Trend line connecting bar tops -->
  <polyline points="113,296 256,196 399,120" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <!-- Coin circle top-left -->
  <circle cx="110" cy="110" r="60" fill="#10b981"/>
  <text x="110" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="68" fill="white">$</text>
</svg>
